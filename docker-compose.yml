services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: resume_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - resume-network

  nginx:
    image: nginx:alpine
    container_name: resume_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - resume-network

  postgres:
    image: postgres:17
    container_name: resume_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resume_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resume-network

  redis:
    image: redis:8-alpine
    container_name: resume_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - resume-network

volumes:
  postgres_data:

networks:
  resume-network:
    driver: bridge
